name: 🍇 Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 🧪 Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build (builder stage)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder
          load: true
          tags: emojicode-agent:builder
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Run tests
        run: docker run --rm emojicode-agent:builder make test
